kind = "web"
previewPath = "/"
title = "Jivika Jain — Marketing Strategist"
version = "1.0.0"
id = "artifacts/jivika-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19729

[services.development]
run = "pnpm --filter @workspace/jivika-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jivika-portfolio", "run", "build" ]
publicDir = "artifacts/jivika-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19729"
BASE_PATH = "/"
